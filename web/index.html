<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetTracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>
    <div id="app">
        <!-- Top Bar -->
        <header class="top-bar">
            <h1 id="page-title">Today</h1>
            <button id="header-action-btn" class="icon-btn hidden" aria-label="Add">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Dashboard View -->
            <section id="view-dashboard" class="view active">
                <div id="dashboard-content"></div>
            </section>

            <!-- Pets View -->
            <section id="view-pets" class="view">
                <div id="pets-content"></div>
            </section>

            <!-- Pet Detail View -->
            <section id="view-pet-detail" class="view">
                <div id="pet-detail-content"></div>
            </section>
        </main>

        <!-- Bottom Tab Bar -->
        <nav class="tab-bar">
            <button class="tab active" data-tab="dashboard">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Today</span>
            </button>
            <button class="tab" data-tab="pets">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21c-1.5 0-2.7-.4-3.6-1.2C7.5 19 7 17.8 7 16.5c0-.8.2-1.5.6-2.1.4-.6 1-1.1 1.7-1.4-.3-.6-.5-1.2-.5-1.8 0-.9.3-1.6.9-2.2.6-.6 1.3-.9 2.1-.9.5 0 .9.1 1.2.3.3-.2.7-.3 1.2-.3.8 0 1.5.3 2.1.9.6.6.9 1.3.9 2.2 0 .6-.2 1.2-.5 1.8.7.3 1.3.8 1.7 1.4.4.6.6 1.3.6 2.1 0 1.3-.5 2.5-1.4 3.3-.9.8-2.1 1.2-3.6 1.2zM8.5 7.5c-.6 0-1.1-.2-1.5-.6S6.4 6.1 6.4 5.5c0-.6.2-1.1.6-1.5S7.9 3.4 8.5 3.4c.6 0 1.1.2 1.5.6s.6.9.6 1.5c0 .6-.2 1.1-.6 1.5s-.9.5-1.5.5zm7 0c-.6 0-1.1-.2-1.5-.6s-.6-.9-.6-1.5c0-.6.2-1.1.6-1.5s.9-.6 1.5-.6c.6 0 1.1.2 1.5.6s.6.9.6 1.5c0 .6-.2 1.1-.6 1.5s-.9.6-1.5.6zM5 11.5c-.6 0-1.1-.2-1.5-.6S2.9 10.1 2.9 9.5c0-.6.2-1.1.6-1.5S4.4 7.4 5 7.4c.6 0 1.1.2 1.5.6s.6.9.6 1.5c0 .6-.2 1.1-.6 1.5s-.9.6-1.5.6zm14 0c-.6 0-1.1-.2-1.5-.6s-.6-.9-.6-1.5c0-.6.2-1.1.6-1.5s.9-.6 1.5-.6c.6 0 1.1.2 1.5.6s.6.9.6 1.5c0 .6-.2 1.1-.6 1.5s-.9.6-1.5.6z"/></svg>
                <span>My Pets</span>
            </button>
        </nav>

        <!-- Modal Overlay -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal" id="modal-container">
                <div class="modal-header">
                    <button class="modal-cancel" id="modal-cancel">Cancel</button>
                    <h2 id="modal-title"></h2>
                    <button class="modal-save" id="modal-save">Save</button>
                </div>
                <div class="modal-body" id="modal-body"></div>
            </div>
        </div>

        <!-- Confirm Dialog -->
        <div id="confirm-overlay" class="modal-overlay hidden">
            <div class="confirm-dialog">
                <h3 id="confirm-title"></h3>
                <p id="confirm-message"></p>
                <div class="confirm-actions">
                    <button class="btn btn-secondary" id="confirm-no">Cancel</button>
                    <button class="btn btn-danger" id="confirm-yes">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
